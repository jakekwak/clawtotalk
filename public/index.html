<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>ClawToTalk</title>
  <link rel="manifest" href="/manifest.json">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: #fff;
      padding: 20px;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
    }

    .container { max-width: 400px; width: 100%; text-align: center; }

    h1 {
      font-size: 2rem;
      margin-bottom: 0.5rem;
      background: linear-gradient(90deg, #00d9ff, #00ff88);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .subtitle { color: #8892b0; margin-bottom: 1rem; font-size: 0.9rem; }

    /* Mode Switcher */
    .mode-switcher {
      display: flex;
      justify-content: center;
      gap: 8px;
      margin-bottom: 1.5rem;
    }

    .mode-btn {
      background: rgba(255,255,255,0.05);
      border: 1px solid #333;
      color: #888;
      padding: 8px 16px;
      border-radius: 20px;
      cursor: pointer;
      font-size: 0.8rem;
      transition: all 0.2s;
    }

    .mode-btn:hover { border-color: #555; color: #aaa; }
    .mode-btn.active {
      background: rgba(0, 217, 255, 0.2);
      border-color: #00d9ff;
      color: #00d9ff;
    }

    .ptt-button {
      width: 180px;
      height: 180px;
      border-radius: 50%;
      border: none;
      background: linear-gradient(145deg, #1e3a5f, #0d2137);
      box-shadow: 0 10px 40px rgba(0, 217, 255, 0.2), inset 0 -5px 20px rgba(0, 0, 0, 0.3);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s ease;
      margin: 0 auto 2rem;
      position: relative;
      overflow: hidden;
    }

    .ptt-button::before {
      content: '';
      position: absolute;
      width: 100%;
      height: 100%;
      border-radius: 50%;
      background: radial-gradient(circle at 30% 30%, rgba(255,255,255,0.1), transparent);
    }

    .ptt-button:active, .ptt-button.recording {
      transform: scale(0.95);
      background: linear-gradient(145deg, #00d9ff, #0088aa);
      box-shadow: 0 5px 30px rgba(0, 217, 255, 0.5), inset 0 -5px 20px rgba(0, 0, 0, 0.2);
    }

    .ptt-button.processing {
      background: linear-gradient(145deg, #ff9500, #cc7700);
      animation: pulse 1s infinite;
    }

    .ptt-button.playing {
      background: linear-gradient(145deg, #00ff88, #00aa55);
    }

    .ptt-button.listening {
      background: linear-gradient(145deg, #9933ff, #6600cc);
      animation: breathe 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.02); }
    }

    @keyframes breathe {
      0%, 100% { box-shadow: 0 10px 40px rgba(153, 51, 255, 0.3); }
      50% { box-shadow: 0 10px 60px rgba(153, 51, 255, 0.5); }
    }

    .mic-icon { width: 60px; height: 60px; fill: #fff; position: relative; z-index: 1; }

    .status { font-size: 1.1rem; color: #8892b0; margin-bottom: 1.5rem; min-height: 1.5rem; }
    .status.recording { color: #00d9ff; }
    .status.processing { color: #ff9500; }
    .status.playing { color: #00ff88; }
    .status.listening { color: #9933ff; }
    .status.error { color: #ff4444; }

    .transcript {
      background: rgba(255, 255, 255, 0.05);
      border-radius: 12px;
      padding: 1rem;
      margin-bottom: 1rem;
      min-height: 100px;
      max-height: 200px;
      overflow-y: auto;
      text-align: left;
      font-size: 0.9rem;
      line-height: 1.5;
    }

    .transcript .user { color: #00d9ff; margin-bottom: 0.5rem; }
    .transcript .assistant { color: #00ff88; }
    .transcript:empty::before { content: 'Tap the button and speak...'; color: #555; font-style: italic; }

    .clear-btn {
      background: transparent;
      border: 1px solid #333;
      color: #666;
      padding: 8px 16px;
      border-radius: 20px;
      cursor: pointer;
      font-size: 0.8rem;
      transition: all 0.2s;
    }

    .clear-btn:hover { border-color: #555; color: #888; }

    .timer { font-size: 0.8rem; color: #555; margin-top: 1rem; }

    /* Volume meter for auto mode */
    .volume-meter {
      width: 100%;
      height: 4px;
      background: #222;
      border-radius: 2px;
      margin-bottom: 1rem;
      overflow: hidden;
      display: none;
    }

    .volume-meter.visible { display: block; }

    .volume-bar {
      height: 100%;
      background: linear-gradient(90deg, #00ff88, #00d9ff);
      width: 0%;
      transition: width 0.05s;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🎙️ <span id="appTitle">ClawToTalk</span></h1>
    <p class="subtitle" id="subtitle">Hold to speak</p>

    <div class="mode-switcher">
      <button class="mode-btn active" data-mode="ptt">Hold</button>
      <button class="mode-btn" data-mode="toggle">Toggle</button>
      <button class="mode-btn" data-mode="auto">Auto</button>
    </div>

    <div class="volume-meter" id="volumeMeter">
      <div class="volume-bar" id="volumeBar"></div>
    </div>

    <button class="ptt-button" id="pttButton">
      <svg class="mic-icon" viewBox="0 0 24 24">
        <path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3zm-1-9c0-.55.45-1 1-1s1 .45 1 1v6c0 .55-.45 1-1 1s-1-.45-1-1V5zm6 6c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/>
      </svg>
    </button>

    <div class="status" id="status">Ready</div>
    <div class="transcript" id="transcript"></div>
    <button class="clear-btn" id="clearBtn">Clear conversation</button>
    <div class="timer" id="timer"></div>
  </div>

  <script>
    const pttButton = document.getElementById('pttButton');
    const status = document.getElementById('status');
    const subtitle = document.getElementById('subtitle');
    const transcript = document.getElementById('transcript');
    const clearBtn = document.getElementById('clearBtn');
    const timer = document.getElementById('timer');
    const volumeMeter = document.getElementById('volumeMeter');
    const volumeBar = document.getElementById('volumeBar');
    const modeBtns = document.querySelectorAll('.mode-btn');

    let mediaRecorder;
    let audioChunks = [];
    let isRecording = false;
    let currentMode = 'ptt'; // ptt, toggle, auto
    let audioContext, analyser, microphone;
    let silenceTimer = null;
    let autoListening = false;

    // Bot name (loaded from server)
    let botName = 'Assistant';
    const appTitle = document.getElementById('appTitle');

    // Mode descriptions
    const getModeDescription = (mode) => ({
      ptt: `Hold to speak with ${botName}`,
      toggle: 'Tap to start/stop recording',
      auto: 'Tap to listen, auto-stops on silence'
    }[mode]);

    // Mode switcher
    modeBtns.forEach(btn => {
      btn.addEventListener('click', () => {
        modeBtns.forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        currentMode = btn.dataset.mode;
        subtitle.textContent = getModeDescription(currentMode);
        
        // Stop any ongoing recording
        if (isRecording) stopRecording();
        if (autoListening) stopAutoListen();
        
        // Show/hide volume meter
        volumeMeter.classList.toggle('visible', currentMode === 'auto');
      });
    });

    async function init() {
      // Load bot config from server
      try {
        const configRes = await fetch('/api/config');
        const config = await configRes.json();
        if (config.botName) {
          botName = config.botName;
          appTitle.textContent = botName;
          subtitle.textContent = getModeDescription(currentMode);
        }
      } catch (e) {
        console.warn('Could not load config:', e);
      }

      // Request mic permission
      try {
        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        stream.getTracks().forEach(t => t.stop());
        status.textContent = 'Ready';
      } catch (err) {
        status.textContent = 'Microphone access denied';
        status.className = 'status error';
        pttButton.disabled = true;
      }
    }

    async function startRecording() {
      if (isRecording) return;
      
      try {
        const stream = await navigator.mediaDevices.getUserMedia({ 
          audio: { echoCancellation: true, noiseSuppression: true }
        });

        // Find supported mime type
        let mimeType = '';
        for (const type of ['audio/webm', 'audio/webm;codecs=opus', 'audio/mp4', 'audio/aac']) {
          if (MediaRecorder.isTypeSupported(type)) { mimeType = type; break; }
        }
        
        const options = mimeType ? { mimeType } : {};
        mediaRecorder = new MediaRecorder(stream, options);
        audioChunks = [];

        mediaRecorder.ondataavailable = (e) => {
          if (e.data.size > 0) audioChunks.push(e.data);
        };

        mediaRecorder.start(100);
        isRecording = true;
        pttButton.classList.add('recording');
        status.textContent = 'Listening...';
        status.className = 'status recording';

        // Set up audio analysis for auto mode
        if (currentMode === 'auto') {
          setupAudioAnalysis(stream);
        }

      } catch (err) {
        console.error('Recording error:', err);
        status.textContent = err.message || 'Recording failed';
        status.className = 'status error';
      }
    }

    function setupAudioAnalysis(stream) {
      audioContext = new (window.AudioContext || window.webkitAudioContext)();
      analyser = audioContext.createAnalyser();
      microphone = audioContext.createMediaStreamSource(stream);
      microphone.connect(analyser);
      analyser.fftSize = 256;
      
      const bufferLength = analyser.frequencyBinCount;
      const dataArray = new Uint8Array(bufferLength);
      
      let silenceStart = null;
      const SILENCE_THRESHOLD = 10;
      const SILENCE_DURATION = 1500; // 1.5 seconds of silence to stop

      function checkAudio() {
        if (!isRecording || currentMode !== 'auto') return;
        
        analyser.getByteFrequencyData(dataArray);
        const average = dataArray.reduce((a, b) => a + b) / bufferLength;
        
        // Update volume meter
        volumeBar.style.width = Math.min(100, average * 2) + '%';
        
        if (average < SILENCE_THRESHOLD) {
          if (!silenceStart) silenceStart = Date.now();
          else if (Date.now() - silenceStart > SILENCE_DURATION) {
            // Silence detected - stop recording
            stopRecording().then(blob => {
              if (blob && blob.size > 2000) sendAudio(blob);
            });
            return;
          }
        } else {
          silenceStart = null;
        }
        
        requestAnimationFrame(checkAudio);
      }
      
      checkAudio();
    }

    async function stopRecording() {
      if (!mediaRecorder || !isRecording) return null;

      return new Promise((resolve) => {
        mediaRecorder.onstop = () => {
          const mimeType = mediaRecorder.mimeType || 'audio/webm';
          const blob = new Blob(audioChunks, { type: mimeType });
          mediaRecorder.stream.getTracks().forEach(t => t.stop());
          isRecording = false;
          pttButton.classList.remove('recording');
          
          if (audioContext) {
            audioContext.close();
            audioContext = null;
          }
          
          resolve(blob);
        };
        mediaRecorder.stop();
      });
    }

    async function sendAudio(blob) {
      if (blob.size < 1000) {
        status.textContent = 'Recording too short';
        status.className = 'status error';
        setTimeout(() => { status.textContent = 'Ready'; status.className = 'status'; }, 2000);
        return;
      }

      pttButton.classList.add('processing');
      status.textContent = 'Processing...';
      status.className = 'status processing';

      try {
        let ext = 'webm';
        const blobType = blob.type.toLowerCase();
        if (blobType.includes('mp4') || blobType.includes('m4a') || blobType.includes('aac')) ext = 'm4a';
        else if (blobType.includes('ogg')) ext = 'ogg';
        else if (blobType.includes('wav')) ext = 'wav';
        
        const formData = new FormData();
        formData.append('audio', blob, `recording.${ext}`);

        const response = await fetch('/api/voice', { method: 'POST', body: formData });
        const data = await response.json();

        if (!response.ok) throw new Error(data.error || 'Request failed');

        // Update bot name if provided
        if (data.botName) botName = data.botName;
        
        transcript.innerHTML = `
          <div class="user"><strong>You:</strong> ${data.userText}</div>
          <div class="assistant"><strong>${botName}:</strong> ${data.assistantText}</div>
        `;

        pttButton.classList.remove('processing');
        pttButton.classList.add('playing');
        status.textContent = 'Speaking...';
        status.className = 'status playing';

        console.log('Audio data size:', data.audio?.length || 0, 'chars');
        
        const audio = new Audio('data:audio/mpeg;base64,' + data.audio);
        audio.onended = () => {
          pttButton.classList.remove('playing');
          status.textContent = 'Ready';
          status.className = 'status';
        };
        audio.onerror = (e) => {
          console.error('Audio playback error:', e);
          pttButton.classList.remove('playing');
          status.textContent = 'Audio error - tap to retry';
          status.className = 'status error';
        };
        
        try {
          await audio.play();
        } catch (playErr) {
          console.error('Play failed:', playErr);
          // iOS might need user interaction - show tap prompt
          status.textContent = 'Tap anywhere to hear response';
          status.className = 'status';
          const playOnTap = async () => {
            document.removeEventListener('click', playOnTap);
            await audio.play();
            pttButton.classList.add('playing');
            status.textContent = 'Speaking...';
            status.className = 'status playing';
          };
          document.addEventListener('click', playOnTap, { once: true });
        }

        timer.textContent = `Response time: ${data.elapsed}ms`;

      } catch (err) {
        pttButton.classList.remove('processing');
        status.textContent = err.message;
        status.className = 'status error';
        setTimeout(() => { status.textContent = 'Ready'; status.className = 'status'; }, 3000);
      }
    }

    // Button handlers - different behavior per mode
    function handleButtonDown() {
      if (currentMode === 'ptt') {
        startRecording();
      }
    }

    async function handleButtonUp() {
      if (currentMode === 'ptt' && isRecording) {
        const blob = await stopRecording();
        if (blob) sendAudio(blob);
      }
    }

    async function handleButtonClick() {
      if (currentMode === 'toggle' || currentMode === 'auto') {
        if (isRecording) {
          const blob = await stopRecording();
          if (blob) sendAudio(blob);
        } else {
          startRecording();
        }
      }
    }

    // Mouse events
    pttButton.addEventListener('mousedown', handleButtonDown);
    pttButton.addEventListener('mouseup', handleButtonUp);
    pttButton.addEventListener('mouseleave', async () => {
      if (currentMode === 'ptt' && isRecording) {
        const blob = await stopRecording();
        if (blob) sendAudio(blob);
      }
    });
    pttButton.addEventListener('click', handleButtonClick);

    // Touch events
    pttButton.addEventListener('touchstart', (e) => {
      e.preventDefault();
      if (currentMode === 'ptt') startRecording();
    });
    pttButton.addEventListener('touchend', async (e) => {
      e.preventDefault();
      if (currentMode === 'ptt' && isRecording) {
        const blob = await stopRecording();
        if (blob) sendAudio(blob);
      } else if (currentMode !== 'ptt') {
        handleButtonClick();
      }
    });

    // Clear conversation
    clearBtn.addEventListener('click', async () => {
      await fetch('/api/clear', { method: 'POST' });
      transcript.innerHTML = '';
      timer.textContent = '';
    });

    init();
  </script>
</body>
</html>
