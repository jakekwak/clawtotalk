<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>ClawToTalk</title>
  <link rel="manifest" href="/manifest.json">
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: #fff;
      padding: 20px;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
    }

    .container {
      max-width: 400px;
      width: 100%;
      text-align: center;
    }

    h1 {
      font-size: 2rem;
      margin-bottom: 0.5rem;
      background: linear-gradient(90deg, #00d9ff, #00ff88);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .subtitle {
      color: #8892b0;
      margin-bottom: 2rem;
      font-size: 0.9rem;
    }

    .ptt-button {
      width: 180px;
      height: 180px;
      border-radius: 50%;
      border: none;
      background: linear-gradient(145deg, #1e3a5f, #0d2137);
      box-shadow: 
        0 10px 40px rgba(0, 217, 255, 0.2),
        inset 0 -5px 20px rgba(0, 0, 0, 0.3);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s ease;
      margin: 0 auto 2rem;
      position: relative;
      overflow: hidden;
    }

    .ptt-button::before {
      content: '';
      position: absolute;
      width: 100%;
      height: 100%;
      border-radius: 50%;
      background: radial-gradient(circle at 30% 30%, rgba(255,255,255,0.1), transparent);
    }

    .ptt-button:active,
    .ptt-button.recording {
      transform: scale(0.95);
      background: linear-gradient(145deg, #00d9ff, #0088aa);
      box-shadow: 
        0 5px 30px rgba(0, 217, 255, 0.5),
        inset 0 -5px 20px rgba(0, 0, 0, 0.2);
    }

    .ptt-button.processing {
      background: linear-gradient(145deg, #ff9500, #cc7700);
      animation: pulse 1s infinite;
    }

    .ptt-button.playing {
      background: linear-gradient(145deg, #00ff88, #00aa55);
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.02); }
    }

    .mic-icon {
      width: 60px;
      height: 60px;
      fill: #fff;
      position: relative;
      z-index: 1;
    }

    .status {
      font-size: 1.1rem;
      color: #8892b0;
      margin-bottom: 1.5rem;
      min-height: 1.5rem;
    }

    .status.recording { color: #00d9ff; }
    .status.processing { color: #ff9500; }
    .status.playing { color: #00ff88; }
    .status.error { color: #ff4444; }

    .transcript {
      background: rgba(255, 255, 255, 0.05);
      border-radius: 12px;
      padding: 1rem;
      margin-bottom: 1rem;
      min-height: 100px;
      max-height: 200px;
      overflow-y: auto;
      text-align: left;
      font-size: 0.9rem;
      line-height: 1.5;
    }

    .transcript .user {
      color: #00d9ff;
      margin-bottom: 0.5rem;
    }

    .transcript .assistant {
      color: #00ff88;
    }

    .transcript:empty::before {
      content: 'Hold the button and speak...';
      color: #555;
      font-style: italic;
    }

    .clear-btn {
      background: transparent;
      border: 1px solid #333;
      color: #666;
      padding: 8px 16px;
      border-radius: 20px;
      cursor: pointer;
      font-size: 0.8rem;
      transition: all 0.2s;
    }

    .clear-btn:hover {
      border-color: #555;
      color: #888;
    }

    .timer {
      font-size: 0.8rem;
      color: #555;
      margin-top: 1rem;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🎙️ ClawToTalk</h1>
    <p class="subtitle">Hold to speak with Gerty</p>

    <button class="ptt-button" id="pttButton">
      <svg class="mic-icon" viewBox="0 0 24 24">
        <path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3zm-1-9c0-.55.45-1 1-1s1 .45 1 1v6c0 .55-.45 1-1 1s-1-.45-1-1V5zm6 6c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/>
      </svg>
    </button>

    <div class="status" id="status">Ready</div>

    <div class="transcript" id="transcript"></div>

    <button class="clear-btn" id="clearBtn">Clear conversation</button>
    
    <div class="timer" id="timer"></div>
  </div>

  <script>
    const pttButton = document.getElementById('pttButton');
    const status = document.getElementById('status');
    const transcript = document.getElementById('transcript');
    const clearBtn = document.getElementById('clearBtn');
    const timer = document.getElementById('timer');

    let mediaRecorder;
    let audioChunks = [];
    let isRecording = false;
    let audioContext;

    // Request mic permission on load
    async function init() {
      try {
        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        stream.getTracks().forEach(t => t.stop()); // Just getting permission
        status.textContent = 'Ready';
      } catch (err) {
        status.textContent = 'Microphone access denied';
        status.className = 'status error';
        pttButton.disabled = true;
      }
    }

    async function startRecording() {
      try {
        const stream = await navigator.mediaDevices.getUserMedia({ 
          audio: {
            echoCancellation: true,
            noiseSuppression: true,
            sampleRate: 16000
          }
        });

        mediaRecorder = new MediaRecorder(stream, { mimeType: 'audio/webm' });
        audioChunks = [];

        mediaRecorder.ondataavailable = (e) => {
          if (e.data.size > 0) {
            audioChunks.push(e.data);
          }
        };

        mediaRecorder.start(100);
        isRecording = true;
        pttButton.classList.add('recording');
        status.textContent = 'Listening...';
        status.className = 'status recording';

      } catch (err) {
        console.error('Recording error:', err);
        status.textContent = 'Recording failed';
        status.className = 'status error';
      }
    }

    async function stopRecording() {
      if (!mediaRecorder || !isRecording) return;

      return new Promise((resolve) => {
        mediaRecorder.onstop = () => {
          const blob = new Blob(audioChunks, { type: 'audio/webm' });
          mediaRecorder.stream.getTracks().forEach(t => t.stop());
          isRecording = false;
          pttButton.classList.remove('recording');
          resolve(blob);
        };
        mediaRecorder.stop();
      });
    }

    async function sendAudio(blob) {
      if (blob.size < 1000) {
        status.textContent = 'Recording too short';
        status.className = 'status error';
        setTimeout(() => {
          status.textContent = 'Ready';
          status.className = 'status';
        }, 2000);
        return;
      }

      pttButton.classList.add('processing');
      status.textContent = 'Processing...';
      status.className = 'status processing';

      const startTime = Date.now();

      try {
        const formData = new FormData();
        formData.append('audio', blob, 'recording.webm');

        const response = await fetch('/api/voice', {
          method: 'POST',
          body: formData,
        });

        const data = await response.json();

        if (!response.ok) {
          throw new Error(data.error || 'Request failed');
        }

        // Update transcript
        transcript.innerHTML = `
          <div class="user"><strong>You:</strong> ${data.userText}</div>
          <div class="assistant"><strong>Gerty:</strong> ${data.assistantText}</div>
        `;

        // Play audio response
        pttButton.classList.remove('processing');
        pttButton.classList.add('playing');
        status.textContent = 'Speaking...';
        status.className = 'status playing';

        const audio = new Audio('data:audio/mpeg;base64,' + data.audio);
        audio.onended = () => {
          pttButton.classList.remove('playing');
          status.textContent = 'Ready';
          status.className = 'status';
        };
        audio.onerror = () => {
          pttButton.classList.remove('playing');
          status.textContent = 'Ready';
          status.className = 'status';
        };
        await audio.play();

        timer.textContent = `Response time: ${data.elapsed}ms`;

      } catch (err) {
        console.error('Error:', err);
        pttButton.classList.remove('processing');
        status.textContent = err.message;
        status.className = 'status error';
        setTimeout(() => {
          status.textContent = 'Ready';
          status.className = 'status';
        }, 3000);
      }
    }

    // PTT Button handlers
    pttButton.addEventListener('mousedown', startRecording);
    pttButton.addEventListener('mouseup', async () => {
      const blob = await stopRecording();
      if (blob) sendAudio(blob);
    });
    pttButton.addEventListener('mouseleave', async () => {
      if (isRecording) {
        const blob = await stopRecording();
        if (blob) sendAudio(blob);
      }
    });

    // Touch support
    pttButton.addEventListener('touchstart', (e) => {
      e.preventDefault();
      startRecording();
    });
    pttButton.addEventListener('touchend', async (e) => {
      e.preventDefault();
      const blob = await stopRecording();
      if (blob) sendAudio(blob);
    });

    // Clear conversation
    clearBtn.addEventListener('click', async () => {
      await fetch('/api/clear', { method: 'POST' });
      transcript.innerHTML = '';
      timer.textContent = '';
    });

    // Initialize
    init();
  </script>
</body>
</html>
